spring:
  application:
    name: ms-assinatura
  threads:
    virtual:
      enabled: true

  r2dbc:
    url: ${DB_URL:r2dbc:postgresql://localhost:5432/assinatura_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin123}

  flyway:
    enabled: true
    url: ${DB_FLYWAY_URL:jdbc:postgresql://localhost:5432/assinatura_db}
    user: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin123}
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: assinatura-group
    listener:
      observation-enabled: true

kafka:
  topics:
    renovacao-solicitada: assinatura.renovacao.solicitada
    pagamento-resultado: pagamento.resultado
    assinatura-cancelada: assinatura.cancelada
    assinatura-suspensa: assinatura.suspensa

ms-usuario:
  url: ${MS_USUARIO_URL:http://localhost:8081}

server:
  port: 8082

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

resilience4j:
  circuitbreaker:
    instances:
      ms-usuario:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    org.apache.kafka: ERROR
    org.springframework.kafka: ERROR
    net.logstash.logback: ERROR
    org.springframework.cache: TRACE